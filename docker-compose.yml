services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-m15db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  # Redis cache
  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - appnet

  # Backend API сервис
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - appnet

  # Telegram Bot сервис
  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8081"
    depends_on:
      - backend
    volumes:
      - ./bot:/app
    networks:
      - appnet

  # Worker для отправки напоминаний
  worker:
    build: ./worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
      - bot
      - redis
    volumes:
      - ./worker:/app
    networks:
      - appnet

  # parser service removed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge
