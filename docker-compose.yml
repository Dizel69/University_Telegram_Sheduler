services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-m15db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  # Redis cache
  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - appnet

  # Backend API сервис
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/metrics > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - appnet

  # Telegram Bot сервис
  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8081"
    depends_on:
      - backend
    volumes:
      - ./bot:/app
    networks:
      - appnet

  # Worker для отправки напоминаний
  worker:
    build: ./worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
      - bot
      - redis
    volumes:
      - ./worker:/app
    networks:
      - appnet

  # parser service removed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - appnet

  # Prometheus (metrics storage + scraping)
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - cadvisor
      - node-exporter
    networks:
      - appnet

  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - appnet

  # cAdvisor (container metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8082:8080"
    networks:
      - appnet

  # node-exporter (host metrics)
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - appnet

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  appnet:
    driver: bridge
